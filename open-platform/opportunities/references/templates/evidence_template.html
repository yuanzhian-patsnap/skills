<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TOPIC}} — 证据链</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #070b14;
  --bg-surface: #0d1525;
  --bg-card: #111c33;
  --bg-elevated: #162040;
  --color-primary: #3b82f6;
  --color-accent: #06d6a0;
  --color-warning: #f59e0b;
  --color-danger: #ef4444;
  --color-purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --border-subtle: rgba(59,130,246,0.15);
  --glow-blue: 0 0 20px rgba(59,130,246,0.3);
  --glow-accent: 0 0 20px rgba(6,214,160,0.3);
  --radius-card: 16px;
  --radius-sm: 8px;
  --font-title: 'Sora', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(7,11,20,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-subtle);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:var(--font-title);font-weight:700;font-size:1rem;color:var(--color-accent);}
.nav-links{display:flex;gap:1.5rem;}
.nav-links a{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;transition:color .2s;}
.nav-links a:hover{color:var(--color-primary);}
.page-header{padding:100px 2rem 40px;max-width:1100px;margin:0 auto;}
.page-title{font-family:var(--font-title);font-size:2rem;font-weight:800;margin-bottom:0.5rem;}
.page-title span{background:linear-gradient(135deg,var(--color-primary),var(--color-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.strength-tabs{display:flex;gap:1rem;padding:0 2rem;max-width:1100px;margin:0 auto 2rem;}
.tab-btn{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:20px;padding:0.4rem 1.2rem;font-size:0.8rem;cursor:pointer;transition:all .2s;color:var(--text-secondary);}
.tab-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
.tab-btn.active{background:rgba(59,130,246,0.15);border-color:var(--color-primary);color:var(--color-primary);}
.evidence-list{max-width:1100px;margin:0 auto;padding:0 2rem 4rem;display:flex;flex-direction:column;gap:1.5rem;}
.evidence-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-card);padding:1.75rem;position:relative;overflow:hidden;transition:all .3s;}
.evidence-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.evidence-card.high::before{background:linear-gradient(90deg,var(--color-accent),var(--color-primary));}
.evidence-card.medium::before{background:linear-gradient(90deg,var(--color-warning),var(--color-primary));}
.evidence-card.low::before{background:linear-gradient(90deg,var(--color-purple),var(--color-primary));}
.evidence-card:hover{border-color:var(--color-primary);box-shadow:var(--glow-blue);}
.claim-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.claim-id{font-family:var(--font-mono);font-size:0.8rem;color:var(--color-primary);background:rgba(59,130,246,0.1);padding:0.25rem 0.75rem;border-radius:4px;}
.strength-badge{font-size:0.75rem;padding:0.25rem 0.75rem;border-radius:4px;}
.strength-badge.high{background:rgba(6,214,160,0.15);color:var(--color-accent);}
.strength-badge.medium{background:rgba(245,158,11,0.15);color:var(--color-warning);}
.strength-badge.low{background:rgba(139,92,246,0.15);color:var(--color-purple);}
.claim-conclusion{font-size:1rem;font-weight:600;color:var(--text-primary);line-height:1.6;margin-bottom:1rem;}
.claim-data{font-size:0.85rem;color:var(--text-secondary);background:var(--bg-surface);border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:0.75rem;line-height:1.7;}
.claim-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;}
.claim-patents{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.75rem;}
.patent-chip{font-family:var(--font-mono);font-size:0.75rem;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:4px;padding:0.2rem 0.5rem;color:var(--color-primary);cursor:pointer;transition:all .2s;}
.patent-chip:hover{box-shadow:0 0 8px rgba(59,130,246,0.5);}
.claim-reasoning{font-size:0.8rem;color:var(--text-muted);font-style:italic;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border-subtle);}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">{{TOPIC}} · 专利情报</span>
  <div class="nav-links">
    <a href="index.html">总览</a>
    <a href="patents.html">专利列表</a>
    <a href="subfields.html">技术分支</a>
    <a href="evidence.html">证据链</a>
    <a href="methodology.html">方法说明</a>
  </div>
</nav>
<div class="page-header">
  <div style="display:inline-block;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:20px;padding:0.4rem 1.2rem;font-size:0.75rem;color:var(--color-primary);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem;">EVIDENCE CHAIN</div>
  <h1 class="page-title"><span>证据链</span> 映射</h1>
  <p style="color:var(--text-secondary);font-size:0.9rem;">{{EVIDENCE_COUNT}} 条结论 · 每条结论均绑定数据来源与代表专利</p>
</div>
<div class="strength-tabs">
  <button class="tab-btn active" onclick="filterEvidence('all',this)">全部</button>
  <button class="tab-btn" onclick="filterEvidence('high',this)">🟢 高强度</button>
  <button class="tab-btn" onclick="filterEvidence('medium',this)">🟡 中强度</button>
  <button class="tab-btn" onclick="filterEvidence('low',this)">🟣 低强度</button>
</div>
<div class="evidence-list" id="evidenceList">
  <!-- {{EVIDENCE_CARDS}} -->
</div>
<script>
const evidenceData = {{EVIDENCE_JSON}};
function renderEvidence(filter){
  const list=document.getElementById('evidenceList');
  const data=filter==='all'?evidenceData:evidenceData.filter(e=>e.strength===filter);
  list.innerHTML=data.map(e=>`
  <div class="evidence-card ${e.strength}">
    <div class="claim-header">
      <span class="claim-id">${e.claim_id}</span>
      <span class="strength-badge ${e.strength}">${e.strength==='high'?'高强度':e.strength==='medium'?'中强度':'低强度'}</span>
    </div>
    <div class="claim-conclusion">${e.conclusion}</div>
    <div class="claim-label">支撑数据</div>
    <div class="claim-data">${e.data_source}</div>
    <div class="claim-label">代表专利</div>
    <div class="claim-patents">${(e.patents||[]).map(p=>`<span class="patent-chip">${p}</span>`).join('')}</div>
    <div class="claim-reasoning">推理说明：${e.reasoning}</div>
  </div>`).join('');
}
function filterEvidence(f,btn){
  renderEvidence(f);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
renderEvidence('all');
</script>
</body>
</html>
